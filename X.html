<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Clone</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 25%;
  padding: 20px;
  border-right: 1px solid #333;
}

.sidebar h2 { font-size: 24px; }

.nav-item {
  margin: 15px 0;
  cursor: pointer;
}

/* Feed */
.feed {
  width: 50%;
  border-right: 1px solid #333;
}

.header {
  padding: 15px;
  font-size: 20px;
  border-bottom: 1px solid #333;
}

.tweet-box {
  padding: 15px;
  border-bottom: 1px solid #333;
}

textarea {
  width: 100%;
  height: 60px;
  background: #111;
  color: #fff;
  border: none;
  padding: 10px;
}

button {
  background: #1da1f2;
  border: none;
  padding: 8px 15px;
  color: white;
  border-radius: 20px;
  margin-top: 10px;
  cursor: pointer;
}

.tweet {
  padding: 15px;
  border-bottom: 1px solid #333;
}

.like-btn {
  cursor: pointer;
  margin-top: 10px;
  color: gray;
}

.like-btn:hover {
  color: red;
}

/* Right */
.right {
  width: 25%;
  padding: 20px;
}

.trend {
  margin-bottom: 10px;
}

/* Profile */
.profile {
  display: none;
  padding: 20px;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>X Clone</h2>
  <div class="nav-item" onclick="showHome()">Home</div>
  <div class="nav-item" onclick="showProfile()">Profile</div>
</div>

<!-- Feed -->
<div class="feed" id="homeSection">
  <div class="header">Home</div>

  <div class="tweet-box">
    <textarea id="tweetInput" placeholder="What's happening?"></textarea>
    <button onclick="postTweet()">Post</button>
  </div>

  <div id="tweets"></div>
</div>

<!-- Profile -->
<div class="feed profile" id="profileSection">
  <div class="header">Profile</div>
  <h3>@yourname</h3>
  <p>Welcome to your profile</p>
</div>

<!-- Right -->
<div class="right">
  <h3>Trends</h3>
  <div class="trend">#AI</div>
  <div class="trend">#Startup</div>
  <div class="trend">#Business</div>
</div>

<script>

// Load tweets from storage
let tweets = JSON.parse(localStorage.getItem("tweets")) || [];

function saveTweets() {
  localStorage.setItem("tweets", JSON.stringify(tweets));
}

function renderTweets() {
  const container = document.getElementById("tweets");
  container.innerHTML = "";

  tweets.forEach((t, index) => {
    const div = document.createElement("div");
    div.className = "tweet";

    div.innerHTML = `
      <p>${t.text}</p>
      <div class="like-btn" onclick="likeTweet(${index})">
        ❤️ ${t.likes}
      </div>
    `;

    container.appendChild(div);
  });
}

function postTweet() {
  const input = document.getElementById("tweetInput");
  const text = input.value;

  if (!text) return;

  tweets.unshift({ text: text, likes: 0 });
  saveTweets();
  renderTweets();

  input.value = "";
}

function likeTweet(index) {
  tweets[index].likes++;
  saveTweets();
  renderTweets();
}

function showProfile() {
  document.getElementById("homeSection").style.display = "none";
  document.getElementById("profileSection").style.display = "block";
}

function showHome() {
  document.getElementById("homeSection").style.display = "block";
  document.getElementById("profileSection").style.display = "none";
}

renderTweets();

</script>

</body>
</html>
